document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ext-transform:uppercase; color:#8aa6cc; margin-bottom:7px;\">Nombre completo<\u002Flabel>\n                <input type=\"text\" placeholder=\"Tu nombre\" style=\"width:100%; box-sizing:border-box; padding:12px 14px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.12); color:#FFFFFF; font-size:15px; font-family:'Exo 2',sans-serif; outline:none; transition:border-color .2s;\" style-focus=\"border-color:#2277FF;\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"margin-bottom:16px;\">\n              <label style=\"display:block; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; margin-bottom:7px;\">Correo electrónico<\u002Flabel>\n              <input type=\"email\" required=\"\" placeholder=\"tu@correo.com\" style=\"width:100%; box-sizing:border-box; padding:12px 14px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.12); color:#FFFFFF; font-size:15px; font-family:'Exo 2',sans-serif; outline:none; transition:border-color .2s;\" style-focus=\"border-color:#2277FF;\">\n            <\u002Fdiv>\n            <div style=\"margin-bottom:22px;\">\n              <label style=\"display:block; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; margin-bottom:7px;\">Contraseña<\u002Flabel>\n              <input type=\"password\" required=\"\" placeholder=\"••••••••\" style=\"width:100%; box-sizing:border-box; padding:12px 14px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.12); color:#FFFFFF; font-size:15px; font-family:'Exo 2',sans-serif; outline:none; transition:border-color .2s;\" style-focus=\"border-color:#2277FF;\">\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"width:100%; padding:14px; border-radius:8px; background:#2277FF; color:#FFFFFF; border:none; font-size:15px; font-weight:700; font-family:'Exo 2',sans-serif; cursor:pointer; box-shadow:0 6px 22px rgba(34,119,255,0.4); transition:all .2s;\" style-hover=\"background:#3a87ff;\">{{ submitLabel }}<\u002Fbutton>\n          <\u002Fform>\n          <p style=\"text-align:center; font-size:13px; color:#8aa6cc; margin:18px 0 0;\">{{ switchHint }} <a href=\"#\" onclick=\"{{ toggleMode }}\" style=\"color:#00CCFF; text-decoration:none; font-weight:600;\">{{ switchAction }}<\u002Fa><\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= MODAL: ADMIN (demo) ================= -->\n  <sc-if value=\"{{ adminOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeAdmin }}\" style=\"position:fixed; inset:0; z-index:210; background:rgba(2,6,14,0.82); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); display:flex; align-items:flex-start; justify-content:center; padding:48px 24px; overflow-y:auto;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%; max-width:860px; background:#080F1F; border:1px solid rgba(34,119,255,0.25); border-radius:16px; box-shadow:0 24px 70px rgba(0,0,0,0.6);\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:26px 30px; border-bottom:1px solid rgba(255,255,255,0.08);\">\n          <div>\n            <div style=\"display:flex; align-items:center; gap:10px;\">\n              <span style=\"width:9px; height:9px; transform:rotate(45deg); background:#00CCFF; box-shadow:0 0 8px #00CCFF;\"><\u002Fspan>\n              <h3 style=\"font-family:'Orbitron',sans-serif; font-weight:600; font-size:18px; margin:0; letter-spacing:1px;\">Panel de registros<\u002Fh3>\n            <\u002Fdiv>\n            <p style=\"font-size:13px; color:#8aa6cc; margin:8px 0 0;\">{{ userCount }} registro(s) · guardados en este navegador (demo · localStorage)<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeAdmin }}\" aria-label=\"Cerrar\" style=\"width:34px; height:34px; flex:none; border-radius:8px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#8aa6cc; font-size:18px; cursor:pointer; transition:all .2s;\" style-hover=\"color:#FFFFFF; border-color:rgba(34,119,255,0.4);\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:8px 14px 14px;\">\n          <div style=\"margin:12px 16px; padding:12px 16px; border-radius:8px; background:rgba(240,160,32,0.08); border:1px solid rgba(240,160,32,0.25); font-size:13px; color:#F0A020; line-height:1.5;\">⚠ Demo: estos datos viven solo en tu navegador y la contraseña se muestra como <em>hash<\u002Fem> de ejemplo. En producción se guardan en un backend seguro (Supabase/Firebase).<\u002Fdiv>\n\n          <sc-if value=\"{{ hasUsers }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"overflow-x:auto;\">\n              <sc-for list=\"{{ usersView }}\" as=\"u\" hint-placeholder-count=\"2\">\n                    <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n                <thead>\n                  <tr style=\"text-align:left;\">\n                    <th style=\"padding:12px 16px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.08);\">Usuario<\u002Fth>\n                    <th style=\"padding:12px 16px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.08);\">Correo<\u002Fth>\n                    <th style=\"padding:12px 16px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.08);\">Contraseña (hash)<\u002Fth>\n                    <th style=\"padding:12px 16px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#8aa6cc; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.08);\">Registrado<\u002Fth>\n                  <\u002Ftr>\n                <\u002Fthead>\n                <tbody>\n                  <tr style=\"border-bottom:1px solid rgba(255,255,255,0.05);\">\n                      <td style=\"padding:14px 16px;\">\n                        <div style=\"display:flex; align-items:center; gap:11px;\">\n                          <span style=\"width:34px; height:34px; flex:none; border-radius:8px; background:rgba(34,119,255,0.15); border:1px solid rgba(34,119,255,0.35); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-weight:700; font-size:14px; color:#00CCFF;\">{{ u.initial }}<\u002Fspan>\n                          <span style=\"color:#FFFFFF; font-weight:600;\">{{ u.name }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Ftd>\n                      <td style=\"padding:14px 16px; color:#D4E4FF;\">{{ u.email }}<\u002Ftd>\n                      <td style=\"padding:14px 16px; color:#8aa6cc; font-family:monospace; font-size:13px;\">{{ u.pwdHash }}<\u002Ftd>\n                      <td style=\"padding:14px 16px; color:#8aa6cc; font-size:13px; white-space:nowrap;\">{{ u.when }}<\u002Ftd>\n                    <\u002Ftr>\n                  \n                <\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:flex-end; padding:18px 16px 8px;\">\n              <button onclick=\"{{ clearUsers }}\" style=\"padding:10px 18px; border-radius:8px; background:transparent; border:1px solid rgba(224,90,154,0.4); color:#E05A9A; font-size:13px; font-weight:600; font-family:'Exo 2',sans-serif; cursor:pointer; transition:all .2s;\" style-hover=\"background:rgba(224,90,154,0.1);\">Vaciar registros<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ noUsers }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:50px 20px 56px; color:#8aa6cc;\">\n              <div style=\"width:52px; height:52px; margin:0 auto 16px; border-radius:50%; border:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; font-size:22px;\">∅<\u002Fdiv>\n              <p style=\"font-size:15px; margin:0;\">Aún no hay registros.<\u002Fp>\n              <p style=\"font-size:13px; margin:8px 0 0;\">Crea una cuenta desde el botón \"Únete\" y aparecerá aquí.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  navRef = React.createRef();\n  progressRef = React.createRef();\n  companionRef = React.createRef();\n  ringRef = React.createRef();\n  COMPANION_C = 282.7;\n  scrollTop = (e) => {\n    if (e) e.preventDefault();\n    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (err) { window.scrollTo(0, 0); }\n    const se = document.scrollingElement;\n    if (se && se.scrollTo) { try { se.scrollTo({ top: 0, behavior: 'smooth' }); } catch (err) { se.scrollTop = 0; } }\n  };\n  state = { modalOpen: false, mode: 'login', submitted: false, adminOpen: false, users: [], openService: null };\n  SERVICES = [\n    { title:'Análisis de CV', desc:'Diagnóstico inteligente de tu perfil con recomendaciones accionables.', detail:'Sube tu CV y recibe un informe con fortalezas, brechas y sugerencias priorizadas. La versión Premium compara tu perfil con otros de tu mismo rubro.', tag:'Freemium → Premium', color:'#14b8a6' },\n    { title:'Micro-comunidades', desc:'Espacios curados por rubro para crecer en comunidad.', detail:'Grupos privados y moderados por industria donde compartir vacantes, eventos y mentoría entre pares verificados.', tag:'Por industria', color:'#2277FF' },\n    { title:'Top 50 Bolivia', desc:'Reconocimiento a los jóvenes más destacados del país.', detail:'Programa anual que destaca a 50 jóvenes profesionales. El sello acompaña tu perfil y abre puertas durante todo el año.', tag:'Reconocimiento anual', color:'#F0A020' },\n    { title:'City Ambassadors', desc:'Embajadores que activan la comunidad en cada ciudad.', detail:'Líderes locales que organizan encuentros y conectan talento con empresas en La Paz, Santa Cruz y Cochabamba.', tag:'La Paz · SCZ · Cbba', color:'#F0A020' },\n    { title:'Programas de Desarrollo', desc:'Formación continua para mantenerte a la vanguardia.', detail:'Workshops, bootcamps y mentorías con expertos de la industria para cerrar brechas de habilidades concretas.', tag:'Workshops · Mentorías', color:'#9B72CF' },\n    { title:'Datos del Mercado', desc:'Salarios, demanda y tendencias del talento boliviano.', detail:'Informe anual con rangos salariales por rol, ciudad y seniority, además de las habilidades más demandadas del mercado.', tag:'Informe anual', color:'#E05A9A' }\n  ];\n  hexA(hex, a) {\n    const n = parseInt(hex.slice(1), 16);\n    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;\n  }\n  STORAGE_KEY = 'conex_users';\n\n  // --- DEMO ONLY: pseudo-hash para ilustrar que la contraseña NUNCA se guarda en texto plano.\n  // En producción esto lo hace el backend con bcrypt/argon2. Ver nota __DEV_HANDOFF__ abajo.\n  demoHash(str) {\n    let h = 0;\n    for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; }\n    return 'sha256$' + h.toString(16).padStart(8, '0') + '…';\n  }\n\n  loadUsers() {\n    try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]'); }\n    catch (e) { return []; }\n  }\n  persist(users) {\n    try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(users)); } catch (e) {}\n  }\n  openAdmin = (e) => {\n    if (e) e.preventDefault();\n    this.setState({ adminOpen: true, users: this.loadUsers() });\n    document.body.style.overflow = 'hidden';\n  };\n  closeAdmin = (e) => {\n    if (e) e.preventDefault();\n    this.setState({ adminOpen: false });\n    document.body.style.overflow = '';\n  };\n  clearUsers = (e) => {\n    if (e) e.preventDefault();\n    this.persist([]);\n    this.setState({ users: [] });\n  };\n\n  open(mode) {\n    return (e) => {\n      if (e) e.preventDefault();\n      this.setState({ modalOpen: true, mode, submitted: false });\n      document.body.style.overflow = 'hidden';\n    };\n  }\n  close = (e) => {\n    if (e) e.preventDefault();\n    this.setState({ modalOpen: false, submitted: false });\n    document.body.style.overflow = '';\n  };\n  setMode(mode) {\n    return (e) => { if (e) e.preventDefault(); this.setState({ mode, submitted: false }); };\n  }\n  toggle = (e) => {\n    if (e) e.preventDefault();\n    this.setState(s => ({ mode: s.mode === 'login' ? 'signup' : 'login', submitted: false }));\n  };\n  onSubmit = (e) => {\n    if (e) e.preventDefault();\n    const form = e && e.target;\n\n    // ====================================================================\n    // __DEV_HANDOFF__  — Punto de conexión con el backend real.\n    // Hoy esto guarda en localStorage (solo este navegador, NO seguro).\n    // Para producción, reemplazar el bloque de abajo por, p.ej., Supabase:\n    //\n    //   import { createClient } from '@supabase/supabase-js'\n    //   const supabase = createClient(URL, ANON_KEY)\n    //   // Registro:\n    //   await supabase.auth.signUp({ email, password, options:{ data:{ name } } })\n    //   // Login:\n    //   await supabase.auth.signInWithPassword({ email, password })\n    //\n    // Supabase hashea la contraseña (bcrypt) y la guarda en su tabla\n    // protegida auth.users — nunca llega en texto plano a tu base.\n    // ====================================================================\n    if (this.state.mode === 'signup' && form) {\n      const get = (sel) => { const el = form.querySelector(sel); return el ? el.value.trim() : ''; };\n      const name = get('input[type=text]');\n      const email = get('input[type=email]');\n      const pwd = get('input[type=password]');\n      const user = {\n        name: name || '(sin nombre)',\n        email,\n        pwdHash: this.demoHash(pwd),   // jamás guardamos pwd en claro\n        createdAt: new Date().toISOString()\n      };\n      const users = [...this.loadUsers(), user];\n      this.persist(users);\n      this.setState({ users });\n    }\n    this.setState({ submitted: true });\n  };\n\n  componentDidMount() {\n    this.onScroll = () => {\n      const nav = this.navRef.current;\n      if (nav) {\n        if (window.scrollY > 30) {\n          nav.style.background = 'rgba(4,11,21,0.82)';\n          nav.style.boxShadow = '0 6px 30px rgba(0,0,0,0.45)';\n          nav.style.borderBottomColor = 'rgba(34,119,255,0.28)';\n        } else {\n          nav.style.background = 'rgba(4,11,21,0.55)';\n          nav.style.boxShadow = 'none';\n          nav.style.borderBottomColor = 'rgba(34,119,255,0.12)';\n        }\n      }\n      const se = document.scrollingElement || document.documentElement;\n      const sy = window.scrollY || se.scrollTop || 0;\n      const h = se.scrollHeight - window.innerHeight;\n      const pct = h > 0 ? Math.min(100, (sy / h) * 100) : 0;\n      if (this.progressRef.current) this.progressRef.current.style.width = pct + '%';\n      const comp = this.companionRef.current;\n      if (comp) {\n        const show = sy > window.innerHeight * 0.55;\n        comp.style.opacity = show ? '1' : '0';\n        comp.style.transform = show ? 'translateY(0) scale(1)' : 'translateY(20px) scale(0.8)';\n        comp.style.pointerEvents = show ? 'auto' : 'none';\n      }\n      if (this.ringRef.current) {\n        this.ringRef.current.style.strokeDashoffset = (this.COMPANION_C * (1 - pct / 100)).toFixed(1);\n      }\n      if (this.navLinks && this.navLinks.length) {\n        const y = sy + 130;\n        let activeId = null, best = -1;\n        this.spyTargets.forEach((t) => { if (t.el && t.el.offsetTop <= y && t.el.offsetTop > best) { best = t.el.offsetTop; activeId = t.id; } });\n        this.navLinks.forEach((a) => {\n          const on = a.getAttribute('data-spy') === activeId;\n          a.style.color = on ? '#00CCFF' : '#D4E4FF';\n          a.style.borderBottomColor = on ? '#00CCFF' : 'transparent';\n        });\n      }\n    };\n    this.navLinks = Array.from(document.querySelectorAll('[data-spy]'));\n    this.spyTargets = this.navLinks.map((a) => ({ id: a.getAttribute('data-spy'), el: document.getElementById(a.getAttribute('data-spy')) }));\n    window.addEventListener('scroll', this.onScroll, { passive: true, capture: true });\n    this.onScroll();\n    this.setState({ users: this.loadUsers() });\n\n    // Scroll-reveal espacial: cada sección entra suave desde abajo.\n    try {\n      const targets = [];\n      document.querySelectorAll('section').forEach((sec) => {\n        const wrap = Array.from(sec.children).find((c) => c.style && c.style.maxWidth) || sec;\n        wrap.style.opacity = '0';\n        wrap.style.transform = 'translateY(34px)';\n        wrap.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n        wrap.style.willChange = 'opacity, transform';\n        targets.push(wrap);\n      });\n      this.revealObs = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if (en.isIntersecting) {\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'translateY(0)';\n            this.revealObs.unobserve(en.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      targets.forEach((t) => this.revealObs.observe(t));\n    } catch (e) {}\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll, { capture: true });\n    if (this.revealObs) this.revealObs.disconnect();\n  }\n\n  renderVals() {\n    const isSignup = this.state.mode === 'signup';\n    const tabBase = \"flex:1; padding:9px; border-radius:7px; border:none; font-size:13px; font-weight:600; font-family:'Exo 2',sans-serif; cursor:pointe llTop,\n      services,\n      adminOpen: this.state.adminOpen,\n      openAdmin: this.openAdmin,\n      closeAdmin: this.closeAdmin,\n      clearUsers: this.clearUsers,\n      usersView,\n      hasUsers: usersView.length > 0,\n      noUsers: usersView.length === 0,\n      userCount: usersView.length,\n      modalOpen: this.state.modalOpen,\n      submitted: this.state.submitted,\n      showForm: !this.state.submitted,\n      isSignup,\n      openLogin: this.open('login'),\n      openSignup: this.open('signup'),\n      closeModal: this.close,\n      stop: (e) => { if (e) e.stopPropagation(); },\n      setLogin: this.setMode('login'),\n      setSignup: this.setMode('signup'),\n      toggleMode: this.toggle,\n      submit: this.onSubmit,\n      loginTabStyle: isSignup ? tabOff : tabOn,\n      signupTabStyle: isSignup ? tabOn : tabOff,\n      submitLabel: isSignup ? 'Crear mi cuenta' : 'Iniciar sesión',\n      switchHint: isSignup ? '¿Ya tienes cuenta?' : '¿Aún no tienes cuenta?',\n      switchAction: isSignup ? 'Inicia sesión' : 'Crea una gratis',\n      successTitle: isSignup ? '¡Cuenta creada!' : '¡Bienvenido de nuevo!',\n      successText: isSignup\n        ? 'Tu perfil está listo. Revisa tu correo para verificar tu cuenta y empezar a conectar.'\n        : 'Sesión iniciada correctamente. Te estamos llevando a tu panel de Conex.'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
